<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hannakin FC – Match Card Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      overflow-x: hidden;
      height: -webkit-fill-available;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #e0e0e0;
      color: #222;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      overflow-y: auto;
      -webkit-tap-highlight-color: transparent;
    }

    .app { display: flex; min-height: 100vh; min-height: -webkit-fill-available; }

    /* ─── Form panel ─────────────────────────────── */
    .form-panel {
      width: 320px;
      min-width: 280px;
      flex-shrink: 0;
      background: #fff;
      border-right: 1px solid #d0d0d0;
      overflow-y: auto;
      padding: 24px 20px 40px;
    }

    .form-title {
      font-size: 22px;
      font-weight: 900;
      color: #111;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-title .pill {
      background: #f5a623;
      color: #000;
      font-size: 10px;
      font-weight: 900;
      padding: 2px 7px;
      border-radius: 3px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .form-subtitle {
      font-size: 12px;
      color: #888;
      margin-bottom: 24px;
    }

    .form-section { margin-bottom: 20px; }

    .section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid #eee;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #555;
      margin-bottom: 3px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="text"],
    input[type="number"],
    input[type="date"],
    select {
      width: 100%;
      padding: 8px 10px;
      border: 1.5px solid #d8d8d8;
      border-radius: 5px;
      font-size: 16px; /* 16px prevents iOS Safari auto-zoom */
      color: #111;
      background: #fafafa;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
      font-family: inherit;
      -webkit-appearance: none;
      appearance: none;
      touch-action: manipulation;
    }

    input:focus, select:focus {
      border-color: #f5a623;
      background: #fffdf7;
    }

    .field       { flex: 1; margin-bottom: 8px; }
    .field-score { flex: 0 0 72px; margin-bottom: 8px; }

    .form-row { display: flex; gap: 8px; }

    /* ── Home/Away toggle ─────────────────────────── */
    .side-toggle {
      display: flex;
      gap: 0;
      border: 1.5px solid #d8d8d8;
      border-radius: 6px;
      overflow: hidden;
    }

    .side-btn {
      flex: 1;
      padding: 12px 0;
      border: none;
      background: #fafafa;
      font-size: 15px;
      font-weight: 700;
      color: #888;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.15s, color 0.15s;
      touch-action: manipulation;
    }

    .side-btn:first-child { border-right: 1.5px solid #d8d8d8; }

    .side-btn.active {
      background: #1a1a1a;
      color: #f5a623;
    }

    /* ── Scorer rows ──────────────────────────────── */
    .scorer-row {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-bottom: 6px;
    }

    .scorer-row select        { flex: 1; min-width: 0; }
    .scorer-row .goals-input  { width: 54px; flex-shrink: 0; text-align: center; }

    .goals-label-inline {
      font-size: 11px;
      color: #aaa;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .btn-remove {
      background: none;
      border: none;
      color: #bbb;
      font-size: 22px;
      cursor: pointer;
      padding: 4px 6px;
      line-height: 1;
      flex-shrink: 0;
      transition: color 0.15s;
      touch-action: manipulation;
      min-width: 36px;
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-remove:hover { color: #cc0000; }

    .btn-add {
      width: 100%;
      background: none;
      border: 1.5px dashed #ccc;
      border-radius: 5px;
      color: #888;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      padding: 10px;
      margin-top: 4px;
      transition: border-color 0.15s, color 0.15s;
      touch-action: manipulation;
      min-height: 44px;
    }
    .btn-add:hover { border-color: #f5a623; color: #c8820a; }

    /* ─── Preview panel ───────────────────────────── */
    .preview-panel {
      flex: 1;
      background: #e0e0e0;
      overflow-y: auto;
      padding: 28px 24px 40px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .preview-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #999;
    }

    /* ─── BBC Card ───────────────────────────────── */
    .bbc-card {
      max-width: 600px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.2);
      font-family: Arial, Helvetica, sans-serif;
    }

    .bbc-header { background: #000; }

    .bbc-topbar {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      gap: 10px;
    }

    .bbc-logo { display: flex; gap: 2px; }

    .bbc-logo-box {
      width: 24px;
      height: 24px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 900;
      color: #000;
    }

    .bbc-sport-label {
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1;
    }

    .bbc-nav {
      background: #1f1f1f;
      display: flex;
      overflow-x: auto;
      border-top: 1px solid #333;
    }
    .bbc-nav::-webkit-scrollbar { display: none; }

    .bbc-nav-item {
      color: #ccc;
      font-size: 13px;
      padding: 10px 14px;
      white-space: nowrap;
      border-bottom: 3px solid transparent;
      text-decoration: none;
      display: block;
    }
    .bbc-nav-item.active {
      color: #fff;
      border-bottom-color: #f5a623;
      font-weight: 700;
    }

    .bbc-breadcrumb {
      background: #2a2a2a;
      padding: 7px 16px;
      font-size: 12px;
      color: #aaa;
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .bbc-breadcrumb a { color: #bbb; text-decoration: none; }
    .crumb-sep { color: #666; font-size: 11px; }

    .match-body { background: #0d1014; color: #fff; }

    .match-date-bar {
      text-align: center;
      padding: 12px 16px 10px;
      border-bottom: 1px solid #1e2428;
    }

    .match-date-text { font-size: 13px; color: #7a8fa0; }

    .score-block {
      display: flex;
      align-items: center;
      padding: 28px 12px 24px;
    }

    .score-team {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 0 8px;
    }

    .team-crest {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid #2e3e4a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 900;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: -1px;
      flex-shrink: 0;
      overflow: hidden;
    }

    .team-crest img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .team-crest.initials-crest { background: #1e2a35; }

    .team-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      text-align: center;
      color: #fff;
      line-height: 1.25;
      letter-spacing: 0.3px;
    }

    .score-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      padding: 0 10px;
    }

    .scores-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .score-num {
      font-size: 58px;
      font-weight: 900;
      color: #fff;
      line-height: 1;
      min-width: 38px;
      text-align: center;
    }

    .score-divider {
      font-size: 34px;
      font-weight: 300;
      color: #3a4e5c;
      line-height: 1;
    }

    .ft-badge {
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 1.5px;
      padding: 3px 10px;
      border-radius: 3px;
      background: #f5a623;
      color: #000;
    }

    .scorers-section {
      border-top: 1px solid #1e2428;
      padding: 14px 16px 16px;
      text-align: center;
    }

    .scorers-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #4a6070;
      margin-bottom: 10px;
    }

    .scorer-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #141c22;
      border: 1px solid #1e2f3a;
      border-radius: 20px;
      padding: 4px 12px 4px 8px;
      margin: 3px 4px;
      font-size: 13px;
      color: #c8d5df;
    }

    .chip-ball { font-size: 14px; line-height: 1; }

    .chip-count {
      font-size: 11px;
      color: #f5a623;
      font-weight: 700;
    }

    @media (max-width: 700px) {
      .app { flex-direction: column; }

      .form-panel {
        width: 100%;
        min-width: unset;
        border-right: none;
        border-bottom: 1px solid #d0d0d0;
        padding: 20px 16px 28px;
        padding-left:  max(16px, env(safe-area-inset-left));
        padding-right: max(16px, env(safe-area-inset-right));
      }

      .preview-panel {
        padding: 16px 12px 40px;
        padding-left:  max(12px, env(safe-area-inset-left));
        padding-right: max(12px, env(safe-area-inset-right));
        padding-bottom: max(40px, env(safe-area-inset-bottom));
      }

      .bbc-card { max-width: 100%; }

      .score-block { padding: 18px 8px 16px; }

      .score-num { font-size: 40px; min-width: 28px; }
      .score-divider { font-size: 24px; }

      .team-crest { width: 52px; height: 52px; }
      .team-title { font-size: 11px; }

      .score-center { padding: 0 6px; gap: 6px; }
      .score-team   { gap: 7px; padding: 0 4px; }

      .scorer-row { flex-wrap: nowrap; }
      .scorer-row select { font-size: 16px; }
      .scorer-row .goals-input { width: 50px; font-size: 16px; }
    }
  </style>
</head>
<body>

<div class="app">

  <!-- ═══ FORM PANEL ══════════════════════════════ -->
  <div class="form-panel">
    <div class="form-title">
      Hannakin FC <span class="pill">Card Gen</span>
    </div>
    <div class="form-subtitle">Build a BBC Sport-style match result</div>

    <!-- Date -->
    <div class="form-section">
      <div class="section-title">Match Date</div>
      <div class="field">
        <label>Date</label>
        <input type="date" id="f-date">
      </div>
    </div>

    <!-- Side -->
    <div class="form-section">
      <div class="section-title">Hannakins plays as</div>
      <div class="side-toggle">
        <button class="side-btn active" id="btn-home" onclick="setSide('home')">🏠 Home</button>
        <button class="side-btn"        id="btn-away" onclick="setSide('away')">✈️ Away</button>
      </div>
    </div>

    <!-- Score -->
    <div class="form-section">
      <div class="section-title">Score</div>
      <div class="form-row">
        <div class="field">
          <label>Hannakins</label>
          <input type="number" id="f-hfc-score" min="0" value="0">
        </div>
        <div class="field">
          <label>Opponent</label>
          <input type="number" id="f-opp-score" min="0" value="0">
        </div>
      </div>
      <div class="field">
        <label>Opponent Name</label>
        <input type="text" id="f-opp-name" placeholder="e.g. Kingswood United">
      </div>
    </div>

    <!-- Goalscorers -->
    <div class="form-section">
      <div class="section-title">Hannakin's Goalscorers</div>
      <div id="scorers-list"></div>
      <button class="btn-add" onclick="addScorer()">+ Add Goalscorer</button>
    </div>
  </div>

  <!-- ═══ PREVIEW PANEL ═══════════════════════════ -->
  <div class="preview-panel">
    <div class="preview-label">Live Preview</div>

    <div class="bbc-card">
      <div class="bbc-header">
        <div class="bbc-topbar">
          <div class="bbc-logo">
            <div class="bbc-logo-box">B</div>
            <div class="bbc-logo-box">B</div>
            <div class="bbc-logo-box">C</div>
          </div>
          <div class="bbc-sport-label">SPORT</div>
        </div>
        <nav class="bbc-nav">
          <a class="bbc-nav-item active">Football</a>
          <a class="bbc-nav-item">Cricket</a>
          <a class="bbc-nav-item">Formula 1</a>
          <a class="bbc-nav-item">Rugby Union</a>
          <a class="bbc-nav-item">Tennis</a>
          <a class="bbc-nav-item">Golf</a>
          <a class="bbc-nav-item">Athletics</a>
        </nav>
      </div>

      <div class="bbc-breadcrumb">
        <a href="#">BBC Sport</a>
        <span class="crumb-sep">›</span>
        <a href="#">Football</a>
        <span class="crumb-sep">›</span>
        <span>Match Result</span>
      </div>

      <div class="match-body">

        <div class="match-date-bar">
          <div class="match-date-text" id="p-date">—</div>
        </div>

        <div class="score-block">
          <div class="score-team">
            <div class="team-crest" id="p-left-crest"></div>
            <div class="team-title"  id="p-left-name">—</div>
          </div>

          <div class="score-center">
            <div class="scores-row">
              <span class="score-num" id="p-left-score">0</span>
              <span class="score-divider">|</span>
              <span class="score-num" id="p-right-score">0</span>
            </div>
            <div class="ft-badge">FT</div>
          </div>

          <div class="score-team">
            <div class="team-crest" id="p-right-crest"></div>
            <div class="team-title"  id="p-right-name">—</div>
          </div>
        </div>

        <div class="scorers-section" id="p-scorers-section" style="display:none">
          <div class="scorers-label">Goals</div>
          <div id="p-scorers-chips"></div>
        </div>

      </div>
    </div>
  </div>

</div>

<script>
const PLAYERS = [
  'Alfie', 'Luca', 'Albie', 'Luke T', 'Luke P',
  'Jessie', 'Bradie', 'Drew', 'Harry C', 'Harry B'
];

const HFC_NAME = 'Hannakins Farm FC';
let _eid  = 0;
let _side = 'home'; // 'home' or 'away'

/* ── Side toggle ─────────────────────────────────── */
function setSide(side) {
  _side = side;
  document.getElementById('btn-home').classList.toggle('active', side === 'home');
  document.getElementById('btn-away').classList.toggle('active', side === 'away');
  updatePreview();
}

/* ── Player dropdown HTML ───────────────────────── */
function playerOptions() {
  return `<option value="">— Player —</option>` +
    PLAYERS.map(p => `<option value="${p}">${p}</option>`).join('');
}

/* ── Add scorer row ──────────────────────────────── */
function addScorer() {
  const id   = ++_eid;
  const list = document.getElementById('scorers-list');
  const row  = document.createElement('div');
  row.className = 'scorer-row';
  row.id = `entry-${id}`;
  row.innerHTML = `
    <select onchange="updatePreview()">${playerOptions()}</select>
    <span class="goals-label-inline">×</span>
    <input type="number" class="goals-input" value="1" min="1" max="20"
           oninput="updatePreview()" title="Goals scored">
    <button class="btn-remove" onclick="removeScorer(${id})" title="Remove">×</button>
  `;
  list.appendChild(row);
  updatePreview();
}

function removeScorer(id) {
  const el = document.getElementById(`entry-${id}`);
  if (el) el.remove();
  updatePreview();
}

/* ── Collect scorers: [{name, goals}] ───────────── */
function getScorers() {
  return [...document.querySelectorAll('#scorers-list .scorer-row')].flatMap(row => {
    const name  = row.querySelector('select').value;
    const goals = parseInt(row.querySelector('.goals-input').value, 10) || 1;
    return name ? [{ name, goals }] : [];
  });
}

/* ── Crest helper ────────────────────────────────── */
function setCrest(el, isHannakin, oppName) {
  if (isHannakin) {
    el.classList.remove('initials-crest');
    el.innerHTML = `<img src="badge.jpeg" alt="Hannakins Farm FC">`;
  } else {
    el.classList.add('initials-crest');
    const n = oppName.trim() || '?';
    const words = n.split(/\s+/);
    el.textContent = words.length === 1
      ? n.substring(0, 2).toUpperCase()
      : (words[0][0] + words[words.length - 1][0]).toUpperCase();
  }
}

/* ── Date formatter ──────────────────────────────── */
function fmtDate(s) {
  if (!s) return '—';
  const d      = new Date(s + 'T12:00:00');
  const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

/* ── Main update ─────────────────────────────────── */
function updatePreview() {
  const hfcScore = document.getElementById('f-hfc-score').value ?? '0';
  const oppScore = document.getElementById('f-opp-score').value ?? '0';
  const oppName  = document.getElementById('f-opp-name').value  || 'Opponents';
  const dateStr  = document.getElementById('f-date').value;
  const scorers  = getScorers();

  const isHome = _side === 'home';

  // Assign left/right based on side
  const leftIsHFC  = isHome;
  const leftName   = isHome ? HFC_NAME  : oppName;
  const rightName  = isHome ? oppName   : HFC_NAME;
  const leftScore  = isHome ? hfcScore  : oppScore;
  const rightScore = isHome ? oppScore  : hfcScore;

  // Crests
  setCrest(document.getElementById('p-left-crest'),  leftIsHFC,  oppName);
  setCrest(document.getElementById('p-right-crest'), !leftIsHFC, oppName);

  // Names
  document.getElementById('p-left-name').textContent  = leftName.toUpperCase();
  document.getElementById('p-right-name').textContent = rightName.toUpperCase();

  // Scores
  document.getElementById('p-left-score').textContent  = leftScore;
  document.getElementById('p-right-score').textContent = rightScore;

  // Date
  document.getElementById('p-date').textContent = fmtDate(dateStr);

  // Scorers chips
  const section = document.getElementById('p-scorers-section');
  const chips   = document.getElementById('p-scorers-chips');
  if (scorers.length) {
    section.style.display = 'block';
    chips.innerHTML = scorers.map(({ name, goals }) => {
      const countHtml = goals > 1
        ? ` <span class="chip-count">×${goals}</span>`
        : '';
      return `<span class="scorer-chip"><span class="chip-ball">⚽</span>${name}${countHtml}</span>`;
    }).join('');
  } else {
    section.style.display = 'none';
    chips.innerHTML = '';
  }
}

/* ── Wire static inputs ──────────────────────────── */
['f-date', 'f-hfc-score', 'f-opp-score', 'f-opp-name'].forEach(id => {
  const el = document.getElementById(id);
  if (el) {
    el.addEventListener('input',  updatePreview);
    el.addEventListener('change', updatePreview);
  }
});

// Default today
document.getElementById('f-date').value = new Date().toISOString().slice(0, 10);

updatePreview();
</script>
</body>
</html>
